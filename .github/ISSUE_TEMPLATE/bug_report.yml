name: Bug report
description: Report a reproducible bug in a game or library
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve galua-gameforge projects

        Before opening an issue, search existing issues and make sure the bug has not already been reported

  - type: dropdown
    id: project_type
    attributes:
      label: Project type
      description: Specify where the bug was found
      options:
        - Game
        - Library
        - Shared infrastructure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and its impact on users or developers
      placeholder: What happened and why it is a bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the minimal sequence of actions that causes the bug
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should have happened
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what actually happened
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the most relevant part of the project
      multiple: true
      options:
        - Game mechanics
        - Bonuses and balance
        - Interface and controls
        - Localization and resources
        - Yandex Games integration
        - Library public API
        - Build and release
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Specify the release version, package version, or commit hash
      placeholder: For example, v1.2.0 or 1a2b3c4

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Specify the OS, browser or Node.js version, and other relevant details
      placeholder: macOS 15, Chrome 138, or Node.js 22
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and additional materials
      description: Add the error message, logs, screenshots, or a link to a minimal reproduction
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and found no duplicate
          required: true
        - label: I removed secrets, tokens, and personal data from the logs
          required: true
