name: Сообщение об ошибке
description: Сообщите о воспроизводимой ошибке в игре или библиотеке
title: "[Ошибка]: "
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что помогаете улучшать проекты Galua Gameforge

        Перед созданием задачи проверьте существующие задачи и убедитесь, что ошибка ещё не описана

  - type: dropdown
    id: project_type
    attributes:
      label: Тип проекта
      description: Укажите, где обнаружена ошибка
      options:
        - Игра
        - Библиотека
        - Общая инфраструктура
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Краткое описание
      description: Опишите проблему и её влияние на пользователя или разработчика
      placeholder: Что произошло и почему это является ошибкой
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      description: Перечислите минимальную последовательность действий, которая приводит к ошибке
      placeholder: |
        1. Открыть ...
        2. Нажать ...
        3. Увидеть ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Опишите, что должно было произойти
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Опишите, что произошло на самом деле
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Область
      description: Выберите наиболее подходящую часть проекта
      multiple: true
      options:
        - Игровая механика
        - Бонусы и баланс
        - Интерфейс и управление
        - Локализация и ресурсы
        - Интеграция с Яндекс Играми
        - Публичный API библиотеки
        - Сборка и выпуск
        - Документация
        - Другое
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия
      description: Укажите версию релиза, пакета или хеш коммита
      placeholder: Например, v1.2.0 или 1a2b3c4

  - type: textarea
    id: environment
    attributes:
      label: Окружение
      description: Укажите ОС, браузер или версию Node.js и другие важные сведения
      placeholder: macOS 15, Chrome 138 или Node.js 22
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи и дополнительные материалы
      description: Добавьте текст ошибки, логи, скриншоты или ссылку на минимальный пример
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Предварительная проверка
      options:
        - label: Я проверил существующие задачи и не нашёл дубликат
          required: true
        - label: Я удалил из логов секреты, токены и персональные данные
          required: true
